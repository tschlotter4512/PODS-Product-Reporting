<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OB Performance Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;color:#1a1a2e;font-size:13px}
:root{--navy:#1C3557;--pos:#15803d;--neg:#DC2626;--muted:#6b7280;--border:#e5e7eb;--surface:#fff}
header{background:var(--navy);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:600}
header span{font-size:12px;opacity:.7}
.tabs{background:var(--navy);display:flex;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.15)}
.tab{padding:10px 18px;color:rgba(255,255,255,.65);cursor:pointer;font-size:12px;font-weight:500;border-bottom:2px solid transparent}
.tab.active{color:#fff;border-bottom-color:#fff}
.tab:hover:not(.active){color:rgba(255,255,255,.85)}
.page{display:none;padding:16px 20px}
.page.active{display:block}
.controls{display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.filter-group{display:flex;gap:4px}
.filter-btn{padding:4px 12px;border:1px solid var(--border);background:var(--surface);border-radius:4px;cursor:pointer;font-size:12px;color:var(--muted)}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.week-tabs{display:flex;gap:4px;flex-wrap:wrap}
.week-btn{padding:5px 12px;border:2px solid var(--border);background:var(--surface);border-radius:5px;cursor:pointer;font-size:11px;color:var(--muted);font-weight:500;transition:all .15s}
.week-btn:hover:not(.active){border-color:#94a3b8;color:#374151}
.week-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700;box-shadow:0 1px 4px rgba(28,53,87,.35)}
.ctrl-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.tbl-wrap{overflow-x:auto;border-radius:6px;border:1px solid var(--border);background:var(--surface)}
table{width:100%;border-collapse:collapse;min-width:960px}
thead th{background:#F8FAFC;padding:8px 10px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
thead th:hover{background:#eef2f7}
thead th.sorted{color:var(--navy)}
thead th .sa{opacity:.35;margin-left:2px;font-size:9px}
thead th.sorted .sa{opacity:1}
tbody tr{border-bottom:1px solid #F3F4F6}
tbody tr:hover{background:#FAFBFC}
td{padding:7px 10px;vertical-align:middle}
td.name-cell{font-weight:500;white-space:nowrap;font-size:12px;min-width:160px;text-align:left}
td.metric-cell{text-align:center;min-width:90px}
.val{font-size:13px;font-weight:500;display:block}
.sub{font-size:10px;display:flex;gap:5px;justify-content:center;margin-top:1px;align-items:center}
.chg{font-weight:600;font-size:10px}
.chg.pos{color:var(--pos)}.chg.neg{color:var(--neg)}.chg.neu{color:#9ca3af}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700}
.badge.CLW{background:#1a1a1a;color:#fff}.badge.CNX{background:#CE202F;color:#fff}
.null-val{color:#d1d5db}

/* ── Summary tab ── */
.org-banner{background:var(--navy);border-radius:8px;padding:24px 28px;margin-bottom:20px;color:#fff}
.org-banner-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;opacity:.65;margin-bottom:16px}
.org-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.org-stat{padding:0 28px 0 0;border-right:1px solid rgba(255,255,255,.15)}
.org-stat:first-child{padding-left:0}
.org-stat:last-child{border-right:none}
.org-stat-label{font-size:14px;opacity:.8;margin-bottom:6px;font-weight:600;letter-spacing:.2px}
.org-stat-val{font-size:38px;font-weight:700;line-height:1;letter-spacing:-1px}
.org-stat-sub{font-size:12px;opacity:.55;margin-top:4px}
.group-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.group-card{background:var(--surface);border-radius:6px;border:1px solid var(--border)}
.group-card-hdr{padding:12px 14px;font-size:15px;font-weight:700;color:#fff;display:flex;justify-content:space-between;align-items:center;border-radius:6px 6px 0 0;letter-spacing:.3px}
.group-card-hdr.CLW{background:#1a1a1a}.group-card-hdr.CNX{background:#CE202F}
.group-card-hdr span{font-size:11px;font-weight:400;opacity:.75}
.gtbl-wrap{overflow-x:auto}
.group-tbl{width:100%;border-collapse:collapse;min-width:320px}
.group-tbl td,.group-tbl th{padding:6px 12px;font-size:12px}
.group-tbl th{background:#F8FAFC;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.group-tbl th:first-child{text-align:left}
.group-tbl td{border-bottom:1px solid #F3F4F6;text-align:right}
.group-tbl td:first-child{text-align:left;font-weight:500;color:#374151}
.group-tbl tr:last-child td{border:none}
.scatter-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--surface);border-radius:6px;border:1px solid var(--border);padding:14px}
.chart-title{font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.chart-legend{display:flex;gap:14px;margin-bottom:8px;font-size:11px;color:var(--muted)}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.divider{height:1px;background:var(--border);margin:16px 0}
canvas{display:block;width:100%;cursor:crosshair}
.tooltip{position:fixed;background:#1C3557;color:#fff;padding:5px 10px;border-radius:4px;font-size:11px;pointer-events:none;display:none;z-index:999}
</style>
</head>
<body>
<div class="tooltip" id="tip"></div>
<header>
  <h1>OB Performance Dashboard</h1>
  <span id="hdr-week"></span>
</header>
<div class="tabs">
  <div class="tab active" data-tab="summary">Summary</div>
  <div class="tab" data-tab="agents">By Agent</div>
</div>

  <div class="org-banner" id="org-banner"></div>

    </div>
    <div class="chart-card">
      <div class="chart-title" id="scat-cur-title"></div>

        <span><span class="ldot" style="background:#1a1a1a"></span>CLW</span>
        <span><span class="ldot" style="background:#CE202F"></span>CNX</span>
        <span style="font-size:10px;color:#9ca3af;margin-left:4px">X=Conv%  Y=Calls/Opp</span>
      </div>
      <canvas id="scat-cur" height="300"></canvas>
    </div>
  </div>
</div>

<!-- BY AGENT -->
<div id="agents-page" class="page">
  <div class="controls">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="ctrl-label">Group</span>
      <div class="filter-group">
        <button class="filter-btn active" data-grp="ALL">All</button>
        <button class="filter-btn" data-grp="CLW">CLW</button>
        <button class="filter-btn" data-grp="CNX">CNX</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="ctrl-label">Week</span>
      <div id="week-selector" class="week-tabs"></div>
    </div>
  </div>
  <div class="tbl-wrap">
    <table><thead id="agent-thead"></thead><tbody id="agent-tbody"></tbody></table>
  </div>
</div>

function orgTotals(wk){
  const ag=D[wk].agents.filter(a=>a.opps);
  const totOpps=ag.reduce((s,a)=>s+(a.opps||0),0);
  const totCont=ag.reduce((s,a)=>s+(a.containers||0),0);
  // Weighted conversion: each agent weighted by their container count
  const convAg=ag.filter(a=>a.conversion!=null&&a.containers!=null&&a.containers>0);
  const conv=convAg.length?convAg.reduce((s,a)=>s+a.conversion*a.containers,0)/convAg.reduce((s,a)=>s+a.containers,0):0;
  return{totOpps,totCont,conv};
}

function cg(g,w){

  // Weighted 7D cancel: each agent weighted by their container count
  const c7ag=ag.filter(a=>a.cancel_7d!=null&&a.containers!=null&&a.containers>0);
  const c7=c7ag.length?c7ag.reduce((s,a)=>s+a.cancel_7d*a.containers,0)/c7ag.reduce((s,a)=>s+a.containers,0):null;
  // Weighted conversion: each agent weighted by their container count
  const convAg=ag.filter(a=>a.conversion!=null&&a.containers!=null&&a.containers>0);

  ctx.fillText('Conversion %',pad.left+pw/2,pad.top+ph+38);
  ctx.save();ctx.translate(14,pad.top+ph/2);ctx.rotate(-Math.PI/2);ctx.fillText('Calls per Opp',0,0);ctx.restore();
  ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.left,pad.top);ctx.lineTo(pad.left,pad.top+ph);ctx.lineTo(pad.left+pw,pad.top+ph);ctx.stroke();
  if(!pts.length){ctx.fillStyle='#9ca3af';ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText('No data',W/2,150);canvas._pts=[];return;}
  pts.forEach(p=>{ctx.beginPath();ctx.arc(toX(p.x),toY(p.y),5,0,Math.PI*2);ctx.fillStyle=p.g==='CLW'?'rgba(26,26,26,0.85)':'rgba(206,32,47,0.85)';ctx.fill();});
  canvas._pts=pts.map(p=>({...p,cx:toX(p.x),cy:toY(p.y)}));
}
function setupTooltip(canvasId){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const tip=document.getElementById('tip');
  canvas.addEventListener('mousemove',e=>{
    const r=canvas.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(canvas.width/r.width),my=(e.clientY-r.top)*(canvas.height/r.height);
    const hit=(canvas._pts||[]).find(p=>Math.hypot(p.cx-mx,p.cy-my)<10);
    if(hit){tip.style.display='block';tip.style.left=(e.clientX+12)+'px';tip.style.top=(e.clientY-8)+'px';tip.textContent=hit.name+': '+hit.x.toFixed(1)+'% conv, '+hit.y.toFixed(2)+' CPO';}
    else tip.style.display='none';
  });
  canvas.addEventListener('mouseleave',()=>{tip.style.display='none';});
}

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{

document.querySelectorAll('[data-grp]').forEach(b=>b.onclick=()=>{

rwb();buildSummary();
